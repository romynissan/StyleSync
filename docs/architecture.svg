<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">StyleSync Architecture</title>
  <desc id="desc">Layered architecture from frontend to AI prediction engine</desc>
  <rect width="920" height="420" fill="#FAF8F5"/>
  <text x="40" y="42" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#2F2F2F">StyleSync Architecture</text>
  <text x="40" y="66" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#6B6B6B">Connecting Fashion Trends to Smarter Inventory Decisions</text>

  <!-- Frontend -->
  <rect x="40" y="96" width="180" height="100" rx="16" fill="#F1E8E0" stroke="#DDD5CE"/>
  <text x="130" y="136" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2F2F2F">Frontend</text>
  <text x="130" y="158" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Next.js � React</text>
  <text x="130" y="176" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">React Query � Recharts</text>

  <!-- Arrow -->
  <path d="M220 146 H250" stroke="#2F2F2F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API -->
  <rect x="250" y="96" width="180" height="100" rx="16" fill="#F1E8E0" stroke="#DDD5CE"/>
  <text x="340" y="136" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2F2F2F">API Layer</text>
  <text x="340" y="158" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Next.js Route Handlers</text>
  <text x="340" y="176" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Typed JSON contracts</text>

  <path d="M430 146 H460" stroke="#2F2F2F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services -->
  <rect x="460" y="96" width="180" height="100" rx="16" fill="#F1E8E0" stroke="#DDD5CE"/>
  <text x="550" y="136" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2F2F2F">Business Logic</text>
  <text x="550" y="158" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">lib/services/*</text>
  <text x="550" y="176" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Stockout � Forecast � KPI</text>

  <path d="M640 146 H670" stroke="#2F2F2F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DB -->
  <rect x="670" y="96" width="210" height="100" rx="16" fill="#F1E8E0" stroke="#DDD5CE"/>
  <text x="775" y="136" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2F2F2F">PostgreSQL</text>
  <text x="775" y="158" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Prisma ORM � Supabase</text>
  <text x="775" y="176" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Products � Inventory � Predictions</text>

  <!-- AI box -->
  <rect x="250" y="250" width="420" height="110" rx="16" fill="#F5E4EB" stroke="#E8B7C8"/>
  <text x="460" y="290" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#2F2F2F">AI Prediction Engine (Python)</text>
  <text x="460" y="314" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Trend scrape � Clean � Score � Ridge forecast � JSON export</text>
  <text x="460" y="336" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#6B6B6B">Synced into DB via POST /api/predictions/sync</text>

  <path d="M460 250 V206" stroke="#E8B7C8" stroke-width="1.75" marker-end="url(#arrowAccent)"/>
  <text x="472" y="232" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#A86D84">upsert predictions</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2F2F2F"/>
    </marker>
    <marker id="arrowAccent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E8B7C8"/>
    </marker>
  </defs>
</svg>
