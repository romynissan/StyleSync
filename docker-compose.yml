services:
  postgres:
    image: postgres:16-alpine
    container_name: fashion-inventory-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
